name: Error lessons pipeline (Pixtral + videos)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Принудительно перезаписать (1=yes)'
        required: false
        default: '0'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  SCREENSHOT_RELEASE_TAG: 'lume-screenshots'
  VIDEO_RELEASE_TAG: 'lesson-videos'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install ffmpeg + edge-tts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install edge-tts --break-system-packages
          sudo ln -sf $(which edge-tts) /usr/local/bin/edge-tts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            npx prisma db push --skip-generate
          else
            echo "DATABASE_URL secret missing"
            exit 1
          fi

      # 1) Создание уроков об ошибках через Mistral
      - name: Step 1 — create error lessons with Mistral
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PIXTRAL_MODEL: pixtral-12b-2409
          GITHUB_REPOSITORY: ${{ github.repository }}
          SCREENSHOT_RELEASE_TAG: ${{ env.SCREENSHOT_RELEASE_TAG }}
          FORCE: ${{ github.event.inputs.force || '0' }}
        run: node scripts/create-error-lessons.mjs

      # 2) генерация mp4: edge-tts + ffmpeg + скриншот
      - name: Step 2 — download screenshots for video generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/screenshots
          # Download all screenshots from release
          gh release download "$SCREENSHOT_RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --dir public/screenshots \
            --pattern "*.png" || true

      - name: Step 3 — generate videos (edge-tts + ffmpeg)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
          FORCE_REGENERATE: ${{ github.event.inputs.force || '0' }}
          LOCALES: 'ru,uz'
          ERROR_LESSONS_ONLY: '1'
        run: |
          mkdir -p public/generated-videos
          node scripts/generate-error-videos.mjs

      # 4) релиз видео в GitHub
      - name: Step 4 — upload videos to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$VIDEO_RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$VIDEO_RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Lesson Videos" \
              --notes "Автогенерация обучающих видео с TTS."
          fi
          shopt -s nullglob
          for f in public/generated-videos/*.mp4; do
            gh release upload "$VIDEO_RELEASE_TAG" "$f" \
              --repo "${{ github.repository }}" --clobber
          done

      # 5) запись ссылок на видео в БД
      - name: Step 5 — sync video URLs to database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
          VIDEO_RELEASE_TAG: ${{ env.VIDEO_RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/sync-video-release-urls.mjs

      - name: Workflow summary
        run: |
          {
            echo "### Error lessons pipeline"
            echo "- Error lessons created and videos generated"
            echo "- Videos release: https://github.com/${{ github.repository }}/releases/tag/${VIDEO_RELEASE_TAG}"
          } >> $GITHUB_STEP_SUMMARY
