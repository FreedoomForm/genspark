name: Republish Lesson Videos

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Тег релиза для видео'
        required: false
        default: 'lesson-videos'
      dry_run:
        description: 'Только проверка без загрузки'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  republish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate local video folder
        run: |
          test -d public/generated-videos
          find public/generated-videos -maxdepth 1 -name '*.mp4' -type f | sort | sed -n '1,200p'

      - name: Create or update release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VIDEO_RELEASE_TAG: ${{ github.event.inputs.release_tag || 'lesson-videos' }}
        run: |
          if ! gh release view "$VIDEO_RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$VIDEO_RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Lesson Videos" \
              --notes "Повторная публикация готовых видеоуроков."
          fi

          gh release upload "$VIDEO_RELEASE_TAG" \
            public/generated-videos/*.mp4 \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Sync URLs to database
        if: github.event.inputs.dry_run != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VIDEO_RELEASE_TAG: ${{ github.event.inputs.release_tag || 'lesson-videos' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/sync-video-release-urls.mjs

      - name: Summary
        env:
          VIDEO_RELEASE_TAG: ${{ github.event.inputs.release_tag || 'lesson-videos' }}
        run: |
          echo "### Republish lesson videos" >> $GITHUB_STEP_SUMMARY
          echo "- Release tag: $VIDEO_RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
