name: Generate Lesson Videos

on:
  workflow_dispatch:
    inputs:
      from:
        description: 'Start from lesson number'
        required: false
        default: '1'
      to:
        description: 'End at lesson number'
        required: false
        default: '200'
      force_regenerate:
        description: 'Force regenerate all videos (1=yes)'
        required: false
        default: '0'
      locales:
        description: 'Locales to generate (comma-separated)'
        required: false
        default: 'ru,uz'

env:
  NODE_VERSION: '20'

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install edge-tts --break-system-packages
          sudo ln -sf $(which edge-tts) /usr/local/bin/edge-tts

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema (safe - only creates missing tables)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Cleaning orphaned LessonProgress records (references to non-existent lessons)..."
            npx prisma db execute --stdin << 'SQL'
            DELETE FROM "LessonProgress" WHERE "lessonId" NOT IN (SELECT id FROM "lesson");
            SQL
            echo "Syncing database schema (creates missing tables only, does NOT delete data)..."
            npx prisma db push --skip-generate
          else
            echo "DATABASE_URL not set"
            exit 1
          fi

      - name: Create output directories
        run: |
          mkdir -p public/generated-videos
          mkdir -p .video-tmp

      - name: Run video generation script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FROM: ${{ github.event.inputs.from || '1' }}
          TO: ${{ github.event.inputs.to || '200' }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || '0' }}
          LOCALES: ${{ github.event.inputs.locales || 'ru,uz' }}
        run: node scripts/generate-videos-local.mjs

      - name: List generated videos
        run: |
          echo "=== Generated videos ==="
          ls -la public/generated-videos/
          echo ""
          echo "Total size:"
          du -sh public/generated-videos/

      - name: Upload videos as artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: public/generated-videos/
          retention-days: 7
          if-no-files-found: warn

  create-release:
    needs: generate-videos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download videos artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-videos
          path: public/generated-videos/

      - name: List videos to upload
        run: |
          echo "=== Videos to upload to GitHub Release ==="
          ls -la public/generated-videos/
          echo ""
          VIDEO_COUNT=$(ls public/generated-videos/*.mp4 2>/dev/null | wc -l)
          echo "Total videos: $VIDEO_COUNT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if release exists
          if gh release view lesson-videos --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release exists, deleting and recreating..."
            gh release delete lesson-videos --yes --repo ${{ github.repository }}
          fi

          # Create new release with all videos
          echo "Creating release with videos..."
          gh release create lesson-videos \
            --repo ${{ github.repository }} \
            --title "Lesson Videos" \
            --notes "Auto-generated lesson tutorial videos with cursor animation and TTS narration." \
            public/generated-videos/*.mp4

          echo ""
          echo "=== Release created successfully! ==="
          echo "Videos are now available at:"
          echo "https://github.com/${{ github.repository }}/releases/tag/lesson-videos"

      - name: Verify release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Release info ==="
          gh release view lesson-videos --repo ${{ github.repository }}
