name: Generate Lesson Videos

on:
  workflow_dispatch:
    inputs:
      from:
        description: 'Начальный номер урока'
        required: false
        default: '1'
      to:
        description: 'Конечный номер урока'
        required: false
        default: '259'
      force_regenerate:
        description: 'Перегенерировать существующие видео (1=yes)'
        required: false
        default: '0'
      locales:
        description: 'Локали через запятую'
        required: false
        default: 'ru,uz'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  VIDEO_RELEASE_TAG: 'lesson-videos'

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install edge-tts --break-system-packages
          sudo ln -sf $(which edge-tts) /usr/local/bin/edge-tts

      - name: Install project dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare output folders
        run: |
          mkdir -p public/generated-videos
          mkdir -p .video-tmp

      - name: Generate lesson videos from database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FROM: ${{ github.event.inputs.from || '1' }}
          TO: ${{ github.event.inputs.to || '259' }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || '0' }}
          LOCALES: ${{ github.event.inputs.locales || 'ru,uz' }}
          VIDEO_RELEASE_TAG: ${{ env.VIDEO_RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-videos-simple.mjs

      - name: Show generated videos
        run: |
          echo "=== Generated videos ==="
          ls -la public/generated-videos | sed -n '1,200p'
          echo ""
          du -sh public/generated-videos

      - name: Upload generated videos artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: public/generated-videos/
          retention-days: 7
          if-no-files-found: error

  release-and-sync:
    needs: generate-videos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Download generated videos artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-videos
          path: public/generated-videos/

      - name: Create or update video release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$VIDEO_RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$VIDEO_RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Lesson Videos" \
              --notes "Автоматически сгенерированные видеоуроки с озвучкой Edge TTS."
          fi

          gh release upload "$VIDEO_RELEASE_TAG" \
            public/generated-videos/*.mp4 \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Sync video URLs to database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VIDEO_RELEASE_TAG: ${{ env.VIDEO_RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/sync-video-release-urls.mjs

      - name: Workflow summary
        run: |
          echo "### Lesson videos" >> $GITHUB_STEP_SUMMARY
          echo "- Release tag: $VIDEO_RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/$VIDEO_RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- Database sync: completed" >> $GITHUB_STEP_SUMMARY
